name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Offline parity tests only — nothing here talks to Beanfun or Discord.
      # The legacy-DES OpenSSL provider flag is set inside the npm script.
      - run: npm test
